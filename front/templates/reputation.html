<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Репутация IP — Servicepipe</title>
    <link rel="icon" type="image/svg+xml" href="../style/logo/logo_sign.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>

<div class="app">
    <div class="sidebar">
        <div class="sidebar-brand">
            <img src="../style/logo/logo_main.svg" alt="Servicepipe">
        </div>

        <div class="profile-container">
            <button class="profile-button" id="profileBtn" aria-expanded="false">
                <svg class="profile-button__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <span class="profile-button__name" id="currentUser">admin</span>
                <svg class="profile-button__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 9l6 6 6-6"/>
                </svg>
            </button>
            <div class="profile-menu is-hidden" id="profileMenu">
                <button class="menu-item" id="btnChangeMyPassword">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    Сменить пароль
                </button>
                <hr class="menu-divider">
                <button class="menu-item menu-item--danger" id="btnLogout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    Выйти
                </button>
            </div>
        </div>

        <button class="action" onclick="window.location.href='/templates/new_index.html'">Назад</button>
    </div>

    <div class="content">
        <div class="page-header">
            <h2 class="page-header__title">Репутация IP</h2>
            <span class="page-header__meta" id="snapshotMeta">Загрузка...</span>
        </div>
        <div class="data-screen data-screen--with-header">
            <div id="reputation-list" style="padding: 20px;">Загрузка...</div>
            <div id="pagination-container"></div>
        </div>
    </div>
</div>

<dialog id="changeMyPasswordDialog" class="modern-dialog">
    <div class="dialog-content">
        <h3>Сменить пароль</h3>
        <p>Новый пароль будет действовать сразу. Текущая сессия останется активной.</p>

        <label class="login-field">
            <span>Новый пароль</span>
            <input type="password" id="myNewPassword" placeholder="Минимум 4 символа">
        </label>
        <label class="login-field">
            <span>Подтвердите пароль</span>
            <input type="password" id="myNewPasswordConfirm" placeholder="Повторите пароль">
        </label>

        <p id="myPasswordWarning" style="color: var(--color-danger); font-size: 13px; margin: 0 0 10px 0; display: none;">
            Пароли не совпадают.
        </p>

        <div class="dialog-actions">
            <button class="secondary-button" onclick="this.closest('dialog').close()">Отмена</button>
            <button class="primary-button" id="btnConfirmMyPassword">Сменить</button>
        </div>
    </div>
</dialog>

<script type="module" src="../scripts/reputation.js"></script>

</body>
</html>
