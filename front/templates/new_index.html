<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DG Control</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link rel="stylesheet" href="../style/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.5/xlsx.full.min.js"></script>
</head>
<body>

<main class="login-page is-hidden">
    <section class="login-card">
        <div class="login-logo">
            <span>CH SERVICE</span>
        </div>
        <form class="login-form">
            <label class="login-field">
                <span>Логин</span>
                <input type="text" name="login" placeholder="admin" required>
            </label>
            <label class="login-field">
                <span>Пароль</span>
                <input type="password" name="password" placeholder="admin" required>
            </label>
            <button type="submit" class="login-button" style="margin-top: 25px;">Вход</button>
        </form>
    </section>
</main>

<div class="app is-hidden">
    <div class="sidebar">
        <div class="profile-container">
            <button class="profile-button" id="profileBtn">👤</button>
            <div class="profile-menu is-hidden" id="profileMenu">
                <div class="profile-info">
                    <span class="profile-label">Логин:</span>
                    <span class="profile-value" id="currentUser">admin</span>
                </div>
                <hr class="menu-divider">
                <button class="logout-button" id="btnLogout">Выйти</button>
            </div>
        </div>

        <button class="action" id="btnCH">Чтение данных из CH</button>
        <button class="action" id="btnDG">Получить данные из DG</button>
        <button class="action" id="btnUpload">Добавить данные</button>
        <button class="action" id="btnExport">Экспорт данных</button>
        <button class="action" id="btnUsers" onclick="window.location.href='/templates/users.html'">Пользователи</button>
    </div>

    <div class="content">
        <div class="data-screen">
            <div id="data-list"></div>
        </div>
        <div id="pagination-container"></div>
    </div>
</div>

<dialog id="uploadDialog" class="modern-dialog">
    <div class="dialog-content">
        <h3>Загрузка файла</h3>
        <p>Выберите XLSX файл для импорта.</p>
        <div class="file-upload-wrapper">
            <input type="file" id="fileInput" accept=".xlsx, .txt">
        </div>
        <div class="dialog-actions">
            <button class="secondary-button" onclick="this.closest('dialog').close()">Отмена</button>
            <button class="primary-button" id="btnUploadFile">Загрузить</button>
        </div>
    </div>
</dialog>

<dialog id="exportDialog" class="modern-dialog">
    <div class="dialog-content">
        <h3>Экспорт данных</h3>

        <label class="login-field">
            <span>Дата</span>
            <input type="date" id="exportFilterDate">
        </label>

        <hr class="menu-divider">

        <label class="login-field">
            <span>С (Дата и Время)</span>
            <span style="display: flex; gap: 10px; align-items: center;">
                <input type="date" id="exportFilterDateFrom" style="flex: 2;">
                <input type="time" id="exportFilterTimeFrom" step="1" style="flex: 2;">
                <button type="button" class="secondary-button" onclick="document.getElementById('exportFilterTimeFrom').value=''" title="Очистить время">×</button>
            </span>
        </label>

        <label class="login-field">
            <span>По (Дата и Время)</span>
            <span style="display: flex; gap: 10px; align-items: center;">
                <input type="date" id="exportFilterDateTo" style="flex: 2;">
                <input type="time" id="exportFilterTimeTo" step="1" style="flex: 2;">
                <button type="button" class="secondary-button" onclick="document.getElementById('exportFilterTimeTo').value=''" title="Очистить время">×</button>
            </span>
        </label>

        <p id="exportPeriodWarning" style="color: #dc2626; font-size: 13px; margin: 0 0 10px 0; display: none;">
            Период не может превышать 7 суток. Скорректируйте даты.
        </p>

        <hr class="menu-divider">

        <label class="login-field">
            <span>IP адрес</span>
            <input type="text" id="exportFilterIP" placeholder="например 192.168.1.1">
        </label>

        <label class="login-field">
            <span>Источник</span>
            <input type="text" id="exportFilterSource" placeholder="например ipban">
        </label>

        <label class="login-field">
            <span>Профиль</span>
            <input type="text" id="exportFilterProfile" placeholder="название профиля">
        </label>

        <hr class="menu-divider">

        <div style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px;">
            <label class="radio-option">
                <input type="checkbox" id="exportUniqueIPs">
                <span>Только уникальные IP</span>
            </label>
            <label class="radio-option">
                <input type="checkbox" id="exportOnlyIPField">
                <span>Только поле с IP адресом</span>
            </label>
        </div>

        <div class="format-options" style="margin-bottom: 15px;">
            <label class="radio-option">
                <input type="radio" name="exportFormat" value="xlsx" checked>
                <span>XLSX (Excel)</span>
            </label>
            <label class="radio-option">
                <input type="radio" name="exportFormat" value="txt">
                <span>TXT (IP-адреса построчно)</span>
            </label>
        </div>

        <div class="dialog-actions">
            <button class="secondary-button" onclick="this.closest('dialog').close()">Отмена</button>
            <button class="primary-button" id="btnConfirmExport">Экспорт</button>
        </div>
    </div>
</dialog>

<dialog id="rchFilterDialog" class="modern-dialog">
    <div class="dialog-content">
        <h3>Фильтры данных CH</h3>

        <label class="login-field">
            <span>Дата</span>
            <input type="date" id="filterDate">
        </label>

        <hr class="menu-divider">

        <label class="login-field">
            <span>С (Дата и Время)</span>
            <span style="display: flex; gap: 10px; align-items: center;">
                <input type="date" id="filterDateFrom" style="flex: 2;">
                <input type="time" id="filterTimeFrom" step="1" style="flex: 2;">
                <button type="button" class="secondary-button" onclick="document.getElementById('filterTimeFrom').value=''" title="Очистить время">×</button>
            </span>
        </label>

        <label class="login-field">
            <span>По (Дата и Время)</span>
            <span style="display: flex; gap: 10px; align-items: center;">
                <input type="date" id="filterDateTo" style="flex: 2;">
                <input type="time" id="filterTimeTo" step="1" style="flex: 2;">
                <button type="button" class="secondary-button" onclick="document.getElementById('filterTimeTo').value=''" title="Очистить время">×</button>
            </span>
        </label>

        <hr class="menu-divider">

        <label class="login-field">
            <span>IP адрес</span>
            <input type="text" id="filterIP" placeholder="например 192.168.1.1">
        </label>

        <label class="login-field">
            <span>Источник</span>
            <input type="text" id="filterSource" placeholder="например spamhaus">
        </label>

        <label class="login-field">
            <span>Профиль</span>
            <input type="text" id="filterProfile" placeholder="название профиля">
        </label>

        <div class="dialog-actions" style="margin-top: 15px;">
            <button class="secondary-button" onclick="document.getElementById('rchFilterDialog').close()">Отмена</button>
            <button class="primary-button" id="btnApplyFilters">Применить</button>
        </div>
    </div>
</dialog>

<dialog id="dgFilterDialog" class="modern-dialog">
    <div class="dialog-content">
        <h3>Параметры запроса к DosGate</h3>

        <label class="login-field">
            <span>Профиль (Name)</span>
            <input type="text" id="dgName" value="feed-gen" placeholder="Введите имя профиля">
        </label>

        <hr class="menu-divider">

        <label class="login-field">
            <span>ID</span>
            <input type="text" id="dgId" value="201">
        </label>

        <label class="login-field">
            <span>Value</span>
            <input type="text" id="dgValue" value="1">
        </label>

        <label class="login-field">
            <span>Type</span>
            <input type="text" id="dgType" value="shost">
        </label>

        <hr class="menu-divider">

        <label class="radio-option" style="margin-bottom: 10 px;">
            <input type="checkbox" id="dgFilterExpired">
            <span>Фильтровать просроченные записи</span>
        </label>

        <div class="dialog-actions" style="margin-top: 15px;">
            <button class="secondary-button" onclick="this.closest('dialog').close()">Отмена</button>
            <button class="primary-button" id="btnApplyDGFilters">Отправить запрос</button>
        </div>
    </div>
</dialog>

<script type="module" src="../scripts/script.js"></script>

</body>
</html>
